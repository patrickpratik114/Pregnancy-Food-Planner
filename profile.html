<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pregnancy App UI</title>
    <style>
        /* Base styles */
        body {
            margin: 20px;
            font-family: Arial, sans-serif;
            background-image: url('https://josesoriano.com/wp-content/uploads/2023/02/4j059aga5s4-1024x683.jpg'); /* Replace with your background image URL */
            background-size: cover; /* Ensures the background image covers the entire viewport */
            background-position: center; /* Centers the background image */
            background-attachment: fixed; /* Keeps the background image fixed while scrolling */
            color: #333; /* Default text color */
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.651); /* Add semi-transparent background to content for readability */
            padding: 20px;
            border-radius: 0px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2); /* Subtle shadow for contrast */
        }


      /* Navbar styles */
      .navbar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #f9f9f9;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        }

        .navbar .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .navbar nav a {
            margin-left: 20px;
            text-decoration: none;
            color: black;
            font-weight: 500;
        }

        .navbar nav a.active {
            color: red;
        }

        /* Section styles */
        .section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 30px;
            max-width: 1100px;
            margin: 0 auto;

        }

        .your-plan {
            flex: 1;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .your-plan h2 {
            margin-bottom: 20px;
        }

        .calendar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .calendar .day {
            width: 80px;
            height: 100px;
            background-color: #b8cbd6;
            border: 2px solid #ddd;
            border-radius: 30px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .calendar .day::before {
            content: "";
            width: 60%;
            height: 10px;
            background-color: red;
            border-radius: 5px 5px 0 0;
            position: absolute;
            top: 0;
        }

        .calendar .day span {
            margin-top: 15px;
        }

        .meal-plan {
            flex: 1;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        }

        .meal-plan h3 {
            margin: 5px 0;
        }

        .meal-plan .meal-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .meal-plan .photo-box {
            width: 200px;
            height: 110px;
            background-color: #d3d3d3;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            overflow: hidden;
            position: relative;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        }

        .meal-plan .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .meal-plan .meal-row button {
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }

        .meal-plan .meal-row button:hover {
            background-color: #0056b3;
        }

        /* Responsive styles */
        @media (max-width: 768px) {
            .section {
                flex-direction: column;
                align-items: center;
            }

            .meal-plan {
                margin-left: 0;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">Logo</div>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="profile.html">Profile</a>
            <a href="login.html">Logout</a>
        </nav>
    </header>

    <!-- Main Content Section -->
    <div class="section">
        <!-- Left Section: Your Plan -->
        <div class="your-plan">
            <h2>Your Plan</h2>
            <div class="calendar">
                <div class="day"><span>MON</span></div>
                <div class="day"><span>TUE</span></div>
                <div class="day"><span>WED</span></div>
                <div class="day"><span>THU</span></div>
                <div class="day"><span>FRI</span></div>
                <div class="day"><span>SAT</span></div>
                <div class="day"><span>SUN</span></div>
            </div>
        </div>

        <!-- Right Section: Meal Plan -->
    <div class="section">
        <div class="meal-plan">
            <center>
                <h3>Breakfast</h3>
            </center>
                <div class="meal-row">
                    <div class="photo-box">
                        <img src="Recipe photos_fyp\Avocado Salad.jpg" alt="Lunch Photo 1">
                    </div>
                    <div class="photo-box">
                        <img src="Recipe photos_fyp\Fruit Smoothie.jpeg" alt="Lunch Photo 2">
                    </div>
                    <a href="https://example.com/lunch" target="_blank"><button>View Lunch</button></a>
                </div>
            <center>
            <h3>Lunch</h3>
        </center>
            <div class="meal-row">
                <div class="photo-box">
                    <img src="Recipe photos_fyp\Baked Chicken Breast.jpg" alt="Lunch Photo 1">
                </div>
                <div class="photo-box">
                    <img src="Recipe photos_fyp\Biryani.jpg" alt="Lunch Photo 2">
                </div>
                <a href="https://example.com/lunch" target="_blank"><button>View Lunch</button></a>
            </div>
            <center>
            <h3>Dinner</h3>
        </center>
            <div class="meal-row">
                <div class="photo-box">
                    <img src="Recipe photos_fyp\Greek Salad.jpg" alt="Dinner Photo 1">
                </div>
                <div class="photo-box">
                    <img src="Recipe photos_fyp\Grilled Chicken Salad.jpeg" alt="Dinner Photo 2">
                </div>
                <a href="https://example.com/dinner" target="_blank"><button>View Dinner</button></a>
            </div>
        </div>
    </div>
</body>
</html>
